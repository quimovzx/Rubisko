<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Website</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        h1 { color: #FF007F; }
        .password-protection { display: none; }
        .congratulations { display: none; }
        .proposal { display: none; }
        input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 15px; color: #fff; background-color: #FF007F; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to my universe!</h1>
        <div class="password-protection">
            <h2>Enter Password</h2>
            <input type="password" id="passwordInput" />
            <button id="submitPassword">Submit</button>
        </div>
        <div class="congratulations">
            <h2>Happy Birthday, my child!</h2>
            <p>Wishing you all the love and happiness on your special day!</p>
        </div>
        <div class="proposal">
            <h2>The Proposal</h2>
            <p>KASHISH, would you make me the happiest person in the world and marry me?</p>
            <button id="hm">Yes</button>
            <button id="may be">No</button>
        </div>
    </div>
    <script>
        const correctPassword = 'KASHISH'; // Replace with the actual password
        document.querySelector('.password-protection').style.display = 'block';
        document.getElementById('submitPassword').addEventListener('click', function() {
            const inputPassword = document.getElementById('passwordInput').value;
            if (inputPassword === correctPassword) {
                document.querySelector('.password-protection').style.display = 'none';
                document.querySelector('.congratulations').style.display = 'block';
                document.querySelector('.proposal').style.display = 'block';
            } else {
                alert('Incorrect password, try again.');
            }
        });
    </script>
</body>
</html>
